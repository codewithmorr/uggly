{% extends "base.html" %}
{% block title %}SYNA - Shop{% endblock %}
{% block content %}

<div class="container my-5">
    <h1 class="mb-4">Available stock</h1>
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 mb-4">
            <div class="product-card">
                <a href="{{ url_for('product_detail', product_id=product.id) }}"></a>
                <img src="{{url_for('static', filename='img/' +product.image)}}" alt="{{product.name}}">
                </a>
                <a href="{{ url_for('product_detail', product_id=product.id) }}"></a>
                <h2>{{ product.name }}</h2>
                </a>
                <p class="price">{{ product.price }}</p>
                <a href="{{ url_for('product_detail', product_id=product.id) }}" class="btn-retro">select options</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

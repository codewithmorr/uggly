{% extends "base.html" %}
{% block title %}SYNA - Shop{% endblock %}
{% block content %}

<div class="container my-5">
    <h1 class="mb-4">Available stock</h1>
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 mb-4">
            <div class="product-card">

<!-- image -->
                <img src="{{url_for('static', filename='img/' +product.image)}}" alt="{{product.name}}">
                </a>
<!-- name -->                
                    <h2>{{ product.name }}</h2>
                <p class="price">{{ product.price }}</p>
<!-- Stock Status -->
                {% if product.stock <= 0 %}
                    <p style="color:red; font-weight:bold;">Out of Stock</p>
                {%else%}

                {% endif %}
                <a href="{{ url_for('product_detail', product_id=product.id) }}" class="btn-retro">select options</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

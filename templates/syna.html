{% extends "base.html" %}

{% block title %} SYNA - Home {% endblock %}

{% block content %}
<div class="home-hero text-center my-5">
<h1 class="glitch-brand"> HUSH & BLUSH </h1>

{% if session.get('username') %}
<p class="lead " style="font-family: monospace; color: #000000; ">
      Hi, {{ session.username }}
</p> 
{% else %}
<p class="lead " style="font-family: monospace; color: #000000; ">
      <a href="{{url_for('login')}}">Login</a> or <a href="{{url_for('register')}}">Register</a>
</p>
{% endif %}
</div>
{% endblock %}

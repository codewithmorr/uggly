{% extends "base.html" %}
{% block title %}{{product.name}}{% endblock %}
{% block content %}

<div class="container my-5 text-center">
    <img src="{{url_for('static', filename='img/' +product.image)}}" alt="{{product.name}}" class="img-fluid mb-3" style="max-height: 300px;">
    <h1>{{product.name}}</h1>
    <p>{{product.description}}</p>
    <h3>{{product.price}}</h3>

        {% if product.stock <= 0 %}
  <button disabled>Out of Stock</button>
{% endif %}
</div>


{% if error %}
<p class="alert alert-danger" style="color: red;">{{ error }}</p>
{% endif %}

    <form action="{{ url_for('add_to_cart',product_id =product.id)}}" method="post" class="mt-3">
    


   

    <!---quantity selector-->
    <label for="quantity">quantity:</label>
    <input type="number" name="quantity" id="quantity"
    value="1" min="1" class="form-control mb-3" style="max-width: 200px;margin: auto;">

    <button type="submit" class="btn-retro" {% if product.stock <= 0 %} disabled {% endif %}>Add to Cart</button>
    </form>

{% endblock %}

{%extends "base.html"%}

{% block title %} Admin Users {% endblock %}

{% block content %}

<div class="container my-5">

    <h2>Registered Users</h2>


    <table class="table">

        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
        </tr>
        {%for user in users%}
        <tr>
            <td>{{user.id}}</td>
            <td>{{user.username}}</td>
            <td>{{user.email}}</td>
        </tr>
        {%endfor%}
    </table>
</div>
{% endblock %}

 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} SYNA{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='syna.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

   <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="{{ url_for('home') }}" >HUSH & BLUSH</a>
  <div class="collapse navbar-collapse">


   <ul class="navbar-nav ms-auto">
  <li class="nav-item">
    <a href="{{url_for('home')}}"><i class="fa-solid fa-home"></i></a>
  </li>
  <li class="nav-item">
    <a href="{{url_for('shop_page')}}" class="nav-link"><i class="fa-solid fa-bag-shopping"></i></a>
  </li>
  <li class="nav-item">
    <a href="{{url_for('checkout')}}" class="nav-link"><i class="fa-solid fa-cart-shopping"></i></a>
  </li>
  <a href="{{ url_for('profile') }}" 
   class="nav-link {% if not session.get('user_id') %}text-danger glow{% endif %}">
    <i class="fa-solid fa-user"></i>
</a>
  {% if session.get("admin") %}
<a href="{{ url_for('admin_dashboard') }}" class="nav-link">
    <i class="fa-solid fa-user-shield"></i> Admin
</a>

{% endif %}
  <li class="nav-item">
    <a href="{{ url_for('logout') }}" class="nav-link"><i class="fa-solid fa-right-from-bracket"></i></a>
</ul>
    
  </li>
</ul>
  </div>
</nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>
    
</body>
</html>

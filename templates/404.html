{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}




<div class="container text-center my-5">
    <h1 class="glitch">404</h1>
    <p class="lead mb-4" style="font-family: monospace; color:#ccc;">
        Lost in the archives... this page doesn’t exist.
    </p>
    
    <a href="{{ url_for('shop_page') }}" 
       class="btn-retro mt-3" 
       style="padding:0.8rem 2rem; border-radius:12px;">
       🔙 Back to Shop
    </a>

    <div class="mt-5" style="color:#777; font-size:0.9rem;">
        <p>Maybe you took a wrong turn?</p>
        <p><em>Or maybe this product is just... too not there.</em></p>
    </div>
</div>
{% endblock %}
